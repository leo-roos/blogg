<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <img id="background-image" src="Assets/Images/Anime-Blogg-BG.png" alt="" srcset="">

        <div class="content">
            <div class="sidebar">
                <div class="profile">
                    <div class="left">
                        <img src="Assets/Images/gojo-emoji.png" alt="" srcset="">
                    </div>
                    <div class="right">
                        <p>Leo</p>
                        <p>Web Developer</p>
                    </div>
                </div>

                <div class="sidebar-items">
                    <div class="sidebar-item">
                        <div class="title">Pages</div>
                        <div class="items">
                            <a class="item" href="/">Hem</a>
                            <a class="item" href="#">Om</a>
                            <a class="item" href="#">Kontakta</a>
                        </div>
                    </div>
                    
                    <div class="sidebar-item">
                        <div class="title">Utvalda Inlägg</div>
                        <div class="items">
                            <a class="item" href="/post.html">Glass Med Rostad lök</a>
                            <a class="item" href="/post.html">Glass Med Rostad lök</a>
                            <a class="item" href="/post.html">Glass Med Rostad lök</a>
                        </div>
                    </div>
                    <div class="sidebar-item">
                        <div class="title">Inställningar</div>
                        <div class="items">
                            <a class="item" href="#">Byt Karaktär</a>
                        </div>
                    </div>
                </div>
            </div>

            <main id="add-new-character">
                <h1>Lägg till ny karaktär</h1>

                <form id="new-character-form">
                    <div class="file">
                        <label for="file-upload">Fil</label>
                        <input type="file" name="file-upload" id="file-upload" required>
                    </div>

                    <div class="label">
                        <label for="label">Namn</label>
                        <input type="text" placeholder="Nagito" name="label" id="label" required>
                    </div>
                    
                    <div class="from">
                        <label for="from">Från</label>
                        <input type="text" placeholder="Danganronpa" name="from" id="from" required>
                    </div>
                    
                    <div class="gender">
                        <label for="gender">Kön</label>
                        <select name="gender" id="gender" required>
                            <option value="male">Man</option>
                            <option value="female">Kvinna</option>
                            <option value="other">Annat</option>
                        </select>
                    </div>

                    <div class="submit">
                        <button type="submit">Lägg Till</button>
                    </div>
                </form>

            </main>

            <div class="gallery">
                <img id="character-image" src="Assets/Images/gojo-emoji.png" alt="" srcset="">
                <!-- <img id="character-image" src="Assets/Images/nagi.png" alt="" srcset=""> -->
                <!-- <button onclick="location.pathname='/character-selection.html'">Change Image</button> -->
            </div>
        </div>
    </div>

    <script src="add-new-character.js"></script>
    <script src="character.js"></script>
    <script src="main.js"></script>
</body>
</html>
